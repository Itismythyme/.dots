# Touchpad
input type:touchpad {
    dwt disabled
    tap enabled
    natural_scroll enabled
    middle_emulation disabled
    accel_profile flat
    pointer_accel 0.8
    scroll_factor 0.5
}

# Keyboard
input type:keyboard {
    xkb_layout "us"
    xkb_options caps:escape
    repeat_delay 300
    repeat_rate 45
}

# Mouse
input type:pointer {
      accel_profile flat
      pointer_accel 0
}

# You can also configure each device individually.
# Read `man 5 sway-input` for more information about this section.

