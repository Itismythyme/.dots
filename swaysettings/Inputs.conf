# Touchpad
input type:touchpad {
    dwt disabled
    tap enabled
    natural_scroll enabled
    middle_emulation disabled
    accel_profile flat
    pointer_accel 0.8
    scroll_factor 0.5
}

#ATK X1 Ultimate wireless
input "14139:4123:Compx_ATK_Mouse_8K_Dongle" {
    accel_profile flat
    pointer_accel 0
}

#ATK X1 Ultimate wired
input "14139:4157:Compx_ATK_X1_Ultimate" {
    accel_profile flat
    pointer_accel 0
}

# Keyboard
input type:keyboard {
    xkb_layout "us"
    xkb_options caps:escape
    repeat_delay 300
    repeat_rate 45
}

# You can also configure each device individually.
# Read `man 5 sway-input` for more information about this section.

